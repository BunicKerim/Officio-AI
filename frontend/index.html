<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Workflow AI – Text zusammenfassen</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      padding: 40px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 6px;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 10px;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 15px;
      cursor: pointer;
    }

    .result {
      margin-top: 25px;
      padding: 15px;
      background: #efefef;
      white-space: pre-wrap;
    }

    .error {
      margin-top: 20px;
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Workflow AI</h1>
    <p>Sachliche Textzusammenfassung (Büroassistent)</p>

    <textarea id="inputText" placeholder="Text hier einfügen..."></textarea>

    <br />
    <button onclick="summarize()">Zusammenfassen</button>

    <div id="result" class="result" style="display:none;"></div>
    <div id="error" class="error"></div>
  </div>

  <script>
    async function summarize() {
      const text = document.getElementById("inputText").value;
      const resultBox = document.getElementById("result");
      const errorBox = document.getElementById("error");

      resultBox.style.display = "none";
      errorBox.innerText = "";

      if (!text.trim()) {
        errorBox.innerText = "Bitte Text eingeben.";
        return;
      }

      try {
        const response = await fetch("http://127.0.0.1:8000/summarize", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        if (!response.ok) {
          throw new Error("Backend-Fehler");
        }

        const data = await response.json();

        resultBox.innerText = data.result;
        resultBox.style.display = "block";

      } catch (err) {
        errorBox.innerText = "Fehler beim Aufruf des Backends";
      }
    }
  </script>

</body>
</html>
